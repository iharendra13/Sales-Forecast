<!DOCTYPE html>
<html>
<head>
<title>Login</title>
<style>
body{display:flex;justify-content:center;align-items:center;height:100vh;background:#667eea;color:white;}
.box{background:rgba(255,255,255,0.1);padding:30px;border-radius:15px;text-align:center;}
input{display:block;margin:10px;padding:10px;border-radius:10px;border:none;}
button{padding:10px;background:#00c6ff;border:none;border-radius:10px;color:white;}
a{color:white;display:block;margin-top:10px;}
</style>
</head>
<body>

<div class="box">
<h2>Login</h2>
<form method="post">
<input name="username" placeholder="Username" required>
<input type="password" name="password" placeholder="Password" required>
<button type="submit">Login</button>
</form>
<p>{{ error }}</p>
<a href="/forgot">Forgot Password?</a>
<a href="/register">Register</a>
</div>

</body>
</html>
