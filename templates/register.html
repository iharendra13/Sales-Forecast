<!DOCTYPE html>
<html>
<head>
<title>Register</title>
<style>
body{display:flex;justify-content:center;align-items:center;height:100vh;background:#ff7e5f;color:white;}
.box{background:rgba(255,255,255,0.1);padding:30px;border-radius:15px;text-align:center;}
input{display:block;margin:10px;padding:10px;border-radius:10px;border:none;}
button{padding:10px;background:#00ffcc;border:none;border-radius:10px;}
</style>
</head>
<body>

<div class="box">
<h2>Register</h2>
<form method="post">
<input name="username" required placeholder="Username">
<input name="password" type="password" required placeholder="Password">
<button type="submit">Register</button>
</form>
<a href="/login">Login</a>
</div>

</body>
</html>
