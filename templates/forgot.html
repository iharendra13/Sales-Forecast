<!DOCTYPE html>
<html>
<head>
<title>Forgot</title>
<style>
body{display:flex;justify-content:center;align-items:center;height:100vh;background:#333;color:white;}
.box{background:rgba(255,255,255,0.1);padding:30px;border-radius:15px;text-align:center;}
input{margin:10px;padding:10px;border-radius:10px;border:none;}
button{padding:10px;background:#00c6ff;border:none;border-radius:10px;}
</style>
</head>
<body>

<div class="box">
<h2>Forgot Password</h2>
<form method="post">
<input name="username" placeholder="Username" required>
<button type="submit">Send OTP</button>
</form>
</div>

</body>
</html>
